  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #06060f;
      font-family: 'Inter', sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* Desktop only: hide default cursor for custom wave ring */
    @media (hover: hover) and (pointer: fine) {
      canvas {
        cursor: none;
      }
    }

    /* Touch devices: keep default cursor */
    @media not all and (hover: hover) {
      canvas {
        cursor: default;
      }
    }

    #sticky-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: rgba(10, 10, 18, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 50;
      font-family: 'Inter', sans-serif;
    }

    #sticky-footer.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #sticky-footer a {
      color: #ffffff88;
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    #sticky-footer a:hover {
      color: #ffffffcc;
    }

    #sticky-footer .sep {
      color: #ffffff33;
      font-size: 11px;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #06060f;
      color: #ffffff99;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: opacity 0.8s ease;
      z-index: 100;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid #ffffff22;
      border-top-color: #ffffff88;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="loading">
    <div class="spinner"></div>
    <span>Measuring type…</span>
  </div>
  <canvas id="canvas"></canvas>
  <div id="sticky-footer">
    <a href="/wave-demo.html">Wave Demo →</a>
    <span class="sep">·</span>
    <a href="https://github.com/Poojan38380/Ink-and-Vapor" target="_blank" rel="noopener">GitHub ↗</a>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
